<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>随行导览 AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a18;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #fff;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    touch-action: manipulation;
  }

  /* ===== 摄像头区域（黄金比例 38.2% : 61.8%） ===== */
  #cameraSection {
    position: relative;
    width: 100%;
    height: 38vh;
    min-height: 200px;
    max-height: 340px;
    background: #111;
    flex-shrink: 0;
    overflow: hidden;
    transition: height 0.3s ease;
  }
  #cameraSection.collapsed { height: 0; min-height: 0; }

  #cameraVideo {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }
  /* 前置摄像头时镜像翻转 */
  #cameraVideo.mirrored { transform: scaleX(-1); }

  #cameraPlaceholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: #555;
  }
  #cameraPlaceholder .cam-icon { font-size: 48px; opacity: 0.4; }
  #cameraPlaceholder p { font-size: 13px; color: #444; text-align: center; }

  /* 扫描线 */
  .scan-line {
    display: none; position: absolute;
    left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(97,88,255,0.8), transparent);
    animation: scanDown 2s linear infinite;
    z-index: 5; top: 0;
  }
  .scan-line.active { display: block; }
  @keyframes scanDown { from { top: 10%; } to { top: 90%; } }

  /* 摄像头控制按钮 */
  #cameraControls {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    gap: 16px; z-index: 10;
    padding: 0 16px;
  }

  .cam-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 20px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    transition: all 0.2s; user-select: none;
    touch-action: manipulation;
  }
  .cam-btn:active { transform: scale(0.88); background: rgba(97,88,255,0.4); }

  #captureBtn {
    width: 56px; height: 56px; font-size: 26px;
    background: rgba(97,88,255,0.6);
    border: 2px solid rgba(97,88,255,0.8);
    box-shadow: 0 0 20px rgba(97,88,255,0.4);
  }
  #captureBtn:active { transform: scale(0.85); }

  #flipBtn {
    position: absolute; top: 10px; right: 12px; z-index: 10;
  }
  #closeCamBtn {
    position: absolute; top: 10px; left: 12px; z-index: 10;
  }

  /* ===== 顶部状态栏 ===== */
  #statusBar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    background: rgba(10,10,24,0.95);
    border-bottom: 1px solid rgba(97,88,255,0.15);
    flex-shrink: 0;
  }
  .status-title { font-size: 16px; font-weight: 600; }
  .status-right { display: flex; gap: 8px; }

  .status-btn {
    padding: 4px 12px; border-radius: 14px;
    background: rgba(97,88,255,0.2); border: 1px solid rgba(97,88,255,0.3);
    color: #fff; font-size: 12px; cursor: pointer;
    transition: all 0.2s; text-decoration: none;
    touch-action: manipulation;
  }
  .status-btn:active { background: rgba(97,88,255,0.5); }

  /* ===== 聊天区域 ===== */
  #chatArea {
    flex: 1; overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  #chatArea::-webkit-scrollbar { width: 3px; }
  #chatArea::-webkit-scrollbar-track { background: transparent; }
  #chatArea::-webkit-scrollbar-thumb { background: rgba(97,88,255,0.2); border-radius: 2px; }

  @keyframes msgIn { from { opacity:0; transform:translateY(10px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

  /* AI 消息 */
  .msg-ai {
    align-self: flex-start; max-width: 85%;
    padding: 12px 16px; border-radius: 18px 18px 18px 4px;
    background: rgba(97,88,255,0.10);
    border: 1px solid rgba(97,88,255,0.18);
    color: rgba(255,255,255,0.93); font-size: 15px;
    line-height: 1.7; word-break: break-word;
    white-space: pre-wrap; animation: msgIn 0.3s ease;
    backdrop-filter: blur(6px);
  }

  /* 用户消息 */
  .msg-user {
    align-self: flex-end; max-width: 80%;
    padding: 10px 14px; border-radius: 18px 18px 4px 18px;
    background: linear-gradient(135deg, #6158ff, #7c6fff);
    color: #fff; font-size: 15px;
    line-height: 1.65; word-break: break-word;
    white-space: pre-wrap; animation: msgIn 0.3s ease;
  }

  /* 图片消息 */
  .msg-photo {
    align-self: flex-end; max-width: 60%;
    border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(97,88,255,0.3);
    animation: msgIn 0.3s ease;
  }
  .msg-photo img { width: 100%; display: block; }

  /* 打字指示器 */
  .typing-ind {
    align-self: flex-start; padding: 14px 18px;
    background: rgba(97,88,255,0.10);
    border: 1px solid rgba(97,88,255,0.18);
    border-radius: 18px 18px 18px 4px;
    display: flex; gap: 5px; animation: msgIn 0.3s ease;
  }
  .typing-ind span {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(97,88,255,0.6);
    animation: typingDot 1.4s ease-in-out infinite;
  }
  .typing-ind span:nth-child(2) { animation-delay: 0.2s; }
  .typing-ind span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:0.3} 30%{transform:translateY(-6px);opacity:1} }

  /* 流式光标 */
  .stream-cursor {
    display: inline-block; width: 2px; height: 14px;
    background: rgba(97,88,255,0.9); border-radius: 1px;
    animation: cursorBlink 0.7s ease-in-out infinite;
    vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ===== 快捷操作区 ===== */
  #quickActions {
    display: flex; gap: 8px; padding: 4px 16px;
    overflow-x: auto; flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  #quickActions::-webkit-scrollbar { display: none; }

  .quick-chip {
    flex-shrink: 0; padding: 7px 14px;
    border-radius: 16px;
    background: rgba(97,88,255,0.12);
    border: 1px solid rgba(97,88,255,0.2);
    color: rgba(255,255,255,0.7);
    font-size: 13px; cursor: pointer;
    white-space: nowrap; transition: all 0.2s;
    touch-action: manipulation;
  }
  .quick-chip:active { background: rgba(97,88,255,0.4); color: #fff; }

  /* ===== 输入栏 ===== */
  #inputBar {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 12px calc(14px + env(safe-area-inset-bottom, 0px));
    background: rgba(10,10,24,0.95);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .bar-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none; color: #fff; font-size: 18px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    touch-action: manipulation;
  }

  /* 语音长条按钮（常驻·松开直接发送） */
  #voiceBtn.voice-pill {
    flex: 1; min-width: 0;
    height: 40px; border-radius: 22px;
    background: rgba(255,255,255,0.10);
    border: none; color: #fff; font-size: 14px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    gap: 8px; padding: 0 16px;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    position: relative;
    overflow: hidden;
  }
  #voiceBtn.voice-pill .voice-icon { font-size: 18px; flex-shrink: 0; transition: transform 0.1s; }
  #voiceBtn.voice-pill .voice-label {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; text-align: left;
  }
  #voiceBtn.voice-pill .voice-text {
    flex: 1; min-width: 0; text-align: left; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 14px;
  }
  #voiceBtn.voice-pill .voice-text:empty { display: none; }
  #voiceBtn.voice-pill.has-text .voice-label { display: none; }

  /* 录音中：变红 + 脉动 */
  #voiceBtn.voice-pill.listening {
    background: rgba(255,80,80,0.75);
    color: #fff;
    animation: voicePulse 1.2s infinite;
  }
  /* 即将松开发送（没拉出去） */
  #voiceBtn.voice-pill.will-send {
    background: rgba(76,175,80,0.8);
  }
  /* 拉出去要撤回（橙色提示） */
  #voiceBtn.voice-pill.will-cancel {
    background: rgba(255,152,0,0.85);
    color: #fff;
  }
  #voiceBtn.voice-pill.will-cancel .voice-icon { transform: translateX(-3px) scale(1.1); }
  #voiceBtn.voice-pill.will-cancel .voice-label::after { content: '·松开取消'; opacity: 0.9; margin-left: 4px; }

  /* 松手"嗖"一下反馈 */
  #voiceBtn.voice-pill.snap-back { transform: scale(0.96); }

  @keyframes voicePulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,0.4)} 50%{box-shadow:0 0 0 6px rgba(255,80,80,0)} }

  /* 输入模式切换（默认 voice-mode 显示长条·⌨️ 键切到 text-mode） */
  #inputBar #inputWrap {
    transition: max-width 0.25s, opacity 0.2s, margin 0.2s;
    max-width: 0; opacity: 0; overflow: hidden;
    margin: 0; padding: 0; border: none;
  }
  #inputBar.text-mode #inputWrap { max-width: 100%; opacity: 1; }
  #inputBar.voice-mode #inputWrap { max-width: 0; opacity: 0; }
  /* 文字模式下：长条收成小圆按钮 + 显示 ⌨️ 切换 */
  #inputBar.text-mode #voiceBtn.voice-pill {
    width: 40px; flex: 0 0 40px; height: 40px; border-radius: 50%; padding: 0;
  }
  #inputBar.text-mode #voiceBtn.voice-pill .voice-label,
  #inputBar.text-mode #voiceBtn.voice-pill .voice-text { display: none !important; }
  /* 文字模式下：发送按钮可见；语音模式下：长条接管中间位置，发送隐藏 */
  #inputBar.voice-mode #sendBtn { display: none; }
  #inputBar.text-mode #sendBtn { display: flex; }
  /* 切换按钮：两种模式都显示，语音模式显示⌨️，文字模式显示🎙 */
  #inputBar.voice-mode #keyboardBtn { display: flex; }
  #inputBar.text-mode #keyboardBtn { display: flex; }

  /* 自动截帧按钮 */
  #autoCapBtn {
    font-size: 14px;
    position: relative;
  }
  #autoCapBtn.active {
    background: rgba(97,88,255,0.5);
    box-shadow: 0 0 8px rgba(97,88,255,0.4);
  }
  #autoCapBtn.active::after {
    content: '';
    position: absolute; top: -2px; right: -2px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #4ade80;
    border: 1px solid #0a0a18;
  }

  #inputWrap {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px; padding: 0 14px;
    display: flex; align-items: center;
    transition: border-color 0.2s;
  }
  #inputWrap:focus-within { border-color: rgba(97,88,255,0.5); }

  #chatInput {
    flex: 1; height: 40px; background: transparent;
    border: none; color: #fff; font-size: 14px;
    outline: none; font-family: inherit;
    -webkit-appearance: none;
  }
  #chatInput::placeholder { color: rgba(255,255,255,0.25); }

  #sendBtn {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #6158ff, #a855f7);
    border: none; color: #fff; font-size: 16px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(97,88,255,0.3);
    touch-action: manipulation;
  }
  #sendBtn:active { transform: scale(0.92); }
  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Toast */
  #toast {
    position: fixed; bottom: calc(70px + env(safe-area-inset-bottom, 0px)); left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(30,30,50,0.92); color: #fff;
    padding: 8px 20px; border-radius: 22px;
    font-size: 13px; z-index: 200;
    pointer-events: none; opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap; backdrop-filter: blur(6px);
    border: 1px solid rgba(97,88,255,0.3);
    max-width: 90vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 上传进度条 */
  #uploadProgress {
    display: none; position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px; background: rgba(97,88,255,0.15);
    z-index: 10; overflow: hidden;
  }
  #uploadProgress.active { display: block; }
  #uploadProgressBar {
    height: 100%; background: rgba(97,88,255,0.7);
    width: 0%; transition: width 0.3s;
  }

  /* ===== 手机端适配：黄金比例 + 大字 ===== */
  @media (max-width: 480px) {
    #cameraSection {
      height: 35vh;
      min-height: 180px;
      max-height: 300px;
    }
    .msg-ai, .msg-user { font-size: 16px; }
    .quick-chip { font-size: 13px; padding: 8px 14px; }
    .status-title { font-size: 15px; }
    .cam-btn { width: 46px; height: 46px; font-size: 20px; }
    #captureBtn { width: 58px; height: 58px; font-size: 26px; }
    #chatInput { font-size: 16px; }
    .bar-btn { width: 42px; height: 42px; font-size: 19px; }
    #voiceBtn.voice-pill { height: 42px; font-size: 15px; }
  }
</style>
</head>
<body>

<!-- 摄像头区域 -->
<div id="cameraSection">
  <video id="cameraVideo" autoplay playsinline muted></video>
  <div id="cameraPlaceholder">
    <div class="cam-icon">📷</div>
    <p>点击下方 📷 开启摄像头识别</p>
  </div>
  <div class="scan-line" id="scanLine"></div>
  <div id="uploadProgress"><div id="uploadProgressBar"></div></div>

  <!-- 翻转镜头按钮 -->
  <button class="cam-btn" id="flipBtn" onclick="flipCamera()" title="翻转镜头">🔄</button>
  <!-- 关闭摄像头 -->
  <button class="cam-btn" id="closeCamBtn" onclick="closeCamera()" title="关闭摄像头">✕</button>

  <!-- 摄像头操作 -->
  <div id="cameraControls">
    <button class="cam-btn" id="captureBtn" onclick="captureAndAsk()" title="拍照识别">📸</button>
  </div>
</div>

<!-- 状态栏 -->
<div id="statusBar">
  <div class="status-title">🤖 AI 导览助手</div>
  <div class="status-right">
    <a class="status-btn" href="navigation.html">🗺 导航</a>
  </div>
</div>

<!-- 聊天区域 -->
<div id="chatArea"></div>

<!-- 快捷操作 -->
<div id="quickActions">
  <div class="quick-chip" onclick="captureAndAsk()">📸 拍照识别</div>
  <div class="quick-chip" onclick="sendQuick('请读取并翻译这个菜单的内容')">📖 读取菜单</div>
  <div class="quick-chip" onclick="sendQuick('请对当地历史进行简单概括')">📚 历史解惑</div>
  <div class="quick-chip" onclick="sendQuick('请帮我规划游览路线')">🗺 路线规划</div>
</div>

<!-- 输入栏 -->
<div id="inputBar" class="voice-mode">
  <button class="bar-btn" id="camToggleBtn" onclick="toggleCamera()" title="开关摄像头">📷</button>
  <button class="bar-btn" id="autoCapBtn" onclick="toggleAutoCapture()" title="自动截帧：AI回复后自动拍照识别">🔗</button>
  <button class="bar-btn active" id="ttsBtn" onclick="toggleTTS()" title="语音播报：AI回复后自动念出来（不念思考过程）">🔊</button>

  <!-- 语音长条（常驻·默认显示·识别中显示文字；松开直接发送·拉出框外撤回） -->
  <button id="voiceBtn" class="voice-pill" title="按住说话·松开发送；拉出框外可撤回">
    <span class="voice-icon">🎙</span>
    <span class="voice-text"></span>
    <span class="voice-label">按住说话</span>
  </button>

  <!-- 文字输入模式（按 ⌨️ 键切出来） -->
  <div id="inputWrap">
    <input type="text" id="chatInput" placeholder="输入你的问题...（按 ⌨️ 切到打字）" maxlength="500" autocomplete="off">
  </div>

  <button id="sendBtn" onclick="handleSend()">➤</button>

  <!-- 切换键（语音模式显示⌨️·文字模式显示🎙） -->
  <button class="bar-btn" id="keyboardBtn" title="切换到键盘输入">⌨️</button>
</div>

<!-- 隐藏的 file input：拖入 / 粘贴 / 拍照 触发，支持图片/视频 -->
<input type="file" id="mediaFileInput" accept="image/*,video/*" capture="environment" style="display:none">

<!-- 连接状态栏 -->
<div id="connBar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:#ff4444;color:#fff;padding:10px 14px;font-size:13px;text-align:center;line-height:1.5;">
  ⚠️ AI 服务未连接 — 请双击 <b>start-server.bat</b> 启动代理服务器，然后通过 <b>http://localhost:9876</b> 或 <b>http://<span id="connIP"></span></b> 访问本页面。
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ========= 配置 =========
const COZE_BOT_ID = '7634912525821214766'
const COZE_PAT    = 'pat_QS0OXlmgaTdW9X1GJSpHZ0zLgJTsr9LIL7IR0ZejsZjQHVEuDM0O2deX9ppekSu2'
const COZE_API    = '/coze-api'
const USER_ID     = 'web_user_' + Math.random().toString(36).substr(2, 9)

let conversationId = null
let isSending = false
let cameraStream = null
let facingMode = 'environment'  // 默认后置摄像头
let isListening = false
let voiceStopFn = null
let autoCaptureOn = false  // 自动截帧开关

// ========= 用户当前位置（用于发给 Coze 做位置相关问答） =========
let currentLocation = null  // {lat, lng, address}
// 三种定位方式：1. 浏览器 GPS  2. 高德 IP 定位  3. 城市名搜索
// 优先用浏览器 GPS（最准），失败再用 IP 定位，最后手动搜

// 尝试获取用户位置（自动调用，失败也无所谓）
async function tryAutoLocate() {
  // 1) 浏览器 GPS 定位
  if (navigator.geolocation) {
    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000, maximumAge: 60000 })
      })
      currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude, source: 'gps' }
      console.log('[Location] GPS:', currentLocation)
      return currentLocation
    } catch (e) { /* 拒绝/失败，继续 */ }
  }
  // 2) 高德 IP 定位（仅做后备，可能 key 没权限）
  try {
    const r = await fetch('/amap-api/v3/ip?key=335c1e1e04d42ff2268d6bf8f0d7c629')
    const j = await r.json()
    if (j && j.rectangle) {
      const rect = j.rectangle.split(';')[0]  // "lng1,lng2;lat1,lat2"
      const parts = rect.split(',')
      const lng = (parseFloat(parts[0]) + parseFloat(parts[1])) / 2
      const lat = (parseFloat(parts[2]) + parseFloat(parts[3])) / 2
      currentLocation = { lat, lng, source: 'ip', city: j.city }
      console.log('[Location] IP:', currentLocation)
      return currentLocation
    }
  } catch (e) { /* 失败，继续 */ }
  return null
}

// 手动设置位置（导航页/城市搜索后会调这个）
function setLocation(lat, lng, address) {
  currentLocation = { lat, lng, address, source: 'manual' }
  console.log('[Location] Manual:', currentLocation)
}

// 获取发给 Coze 的位置上下文文本
function getLocationContext() {
  if (!currentLocation) return ''
  const { lat, lng, address, source } = currentLocation
  // 用 WGS-84 直接给（Coze 那边若有逆地理可自己转；这里直接给 raw 数字最稳）
  const loc = `📍 当前坐标: ${lng.toFixed(6)}, ${lat.toFixed(6)}`  // 高德是 GCJ-02，但 Coze 拿到坐标自己处理即可
  const addr = address ? `\n📮 当前位置: ${address}` : ''
  return `\n\n[系统提示：用户当前所在位置（用于导览/路线规划，请基于此规划）]\n${loc}${addr}\n[提示结束]`
}
let serverOnline = false   // 代理服务器是否在线

// ========= 服务器健康检查 =========
async function checkServer() {
  // 计算可用访问地址（IP 优先，回退 localhost）
  const connIP = document.getElementById('connIP')
  if (connIP) {
    connIP.textContent = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? '<你的电脑局域网 IP>'
      : location.host
  }
  try {
    const r = await fetch('/health', { method: 'GET', signal: AbortSignal.timeout(3000), cache: 'no-store' })
    if (!r.ok) throw new Error('not ok')
    serverOnline = true
    const bar = document.getElementById('connBar')
    if (bar) bar.style.display = 'none'
    return true
  } catch (e) {
    // 探活失败不立刻报警（可能是手机/远程访问 /health 路径返回 200 但被中间盒误判）
    // 只在 API 实际调用失败时才显示红框（见 handleApiError）
    serverOnline = false
    return false
  }
}
// 定期检查（每 30 秒），不再无脑显示红框
setInterval(checkServer, 30000)

// ========= Toast =========
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  clearTimeout(t._timer)
  t._timer = setTimeout(() => t.classList.remove('show'), duration)
}

// ========= 摄像头 =========
async function startCamera() {
  if (cameraStream) return
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    })
    const video = document.getElementById('cameraVideo')
    video.srcObject = cameraStream
    video.style.display = 'block'
    // 前置摄像头时镜像翻转
    video.classList.toggle('mirrored', facingMode === 'user')
    document.getElementById('cameraPlaceholder').style.display = 'none'
    document.getElementById('scanLine').classList.add('active')
    document.getElementById('cameraSection').classList.remove('collapsed')
    showToast('摄像头已开启 📷')
  } catch (e) {
    console.error('Camera error:', e)
    showToast('摄像头权限被拒绝或不可用')
  }
}

function closeCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop())
    cameraStream = null
  }
  const video = document.getElementById('cameraVideo')
  video.srcObject = null
  video.style.display = 'none'
  video.classList.remove('mirrored')
  document.getElementById('cameraPlaceholder').style.display = 'flex'
  document.getElementById('scanLine').classList.remove('active')
  showToast('摄像头已关闭')
}

function toggleCamera() {
  if (cameraStream) { closeCamera() }
  else { startCamera() }
}

// 翻转镜头（前后摄像头切换）
async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment'
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop())
    cameraStream = null
  }
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    })
    const video = document.getElementById('cameraVideo')
    video.srcObject = cameraStream
    video.classList.toggle('mirrored', facingMode === 'user')
    showToast(facingMode === 'user' ? '已切换前置摄像头 🔄' : '已切换后置摄像头 🔄')
  } catch (e) {
    showToast('切换摄像头失败')
    facingMode = facingMode === 'environment' ? 'user' : 'environment'
  }
}

// ========= 截取当前摄像头画面（返回 base64） =========
function captureFrame() {
  const video = document.getElementById('cameraVideo')
  if (!video.srcObject || !cameraStream) return null

  const canvas = document.createElement('canvas')
  canvas.width = video.videoWidth || 640
  canvas.height = video.videoHeight || 480
  const ctx = canvas.getContext('2d')

  // 前置摄像头时镜像翻转绘制
  if (facingMode === 'user') {
    ctx.translate(canvas.width, 0)
    ctx.scale(-1, 1)
  }
  ctx.drawImage(video, 0, 0)
  return canvas.toDataURL('image/jpeg', 0.8)
}

// ========= 上传图片到 Coze，获取 file_id =========
async function uploadImageToCoze(base64Data) {
  // base64 转 Blob
  const byteString = atob(base64Data.split(',')[1])
  const mimeString = base64Data.split(',')[0].split(':')[1].split(';')[0]
  const ab = new ArrayBuffer(byteString.length)
  const ia = new Uint8Array(ab)
  for (let i = 0; i < byteString.length; i++) { ia[i] = byteString.charCodeAt(i) }
  const blob = new Blob([ab], { type: mimeString })

  // 创建 FormData
  const formData = new FormData()
  formData.append('file', blob, 'camera_capture.jpg')
  formData.append('type', 'image')

  // 显示上传进度
  const prog = document.getElementById('uploadProgress')
  const progBar = document.getElementById('uploadProgressBar')
  prog.classList.add('active')
  progBar.style.width = '0%'

  try {
    const resp = await fetch(COZE_API + '/v1/files/upload', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + COZE_PAT },
      body: formData
    })

    progBar.style.width = '100%'

    if (!resp.ok) {
      const errTxt = await resp.text().catch(() => '')
      throw new Error('UPLOAD_FAIL_' + resp.status + ':' + errTxt)
    }

    const result = await resp.json()

    if (result.code !== 0) {
      throw new Error('UPLOAD_ERROR:' + (result.msg || 'Unknown error'))
    }

    const fileId = result.data.id
    showToast('图片上传成功 ✅')
    return fileId

  } catch (err) {
    console.error('[Upload] Error:', err)
    showToast('图片上传失败，请重试')
    return null
  } finally {
    setTimeout(() => {
      prog.classList.remove('active')
      progBar.style.width = '0%'
    }, 500)
  }
}

    : '请对当地历史进行简单概括'

async function fetchIP() {
  const apis = [
    { url: 'https://api.ipify.org?format=json', parse: j => j.ip },
    { url: 'https://ipapi.co/json/', parse: j => j.ip },
    { url: 'https://api.ip.sb/jsonip', parse: j => j.ip }
  ]
  for (const api of apis) {
    try {
      const ctrl = new AbortController()
      const t = setTimeout(() => ctrl.abort(), 3000)
      const resp = await fetch(api.url, { signal: ctrl.signal })
      clearTimeout(t)
      if (!resp.ok) continue
      const j = await resp.json()
      const ip = api.parse(j)
      if (ip) return ip
    } catch (e) { /* try next */ }
  }
  return null
}

// ========= 语音输入（按住说话·松开直接发送·拉出框外撤回） =========
let voiceRecog = null
let voiceBaseText = ''
let voiceInterimShown = ''
let mediaRecorder = null
let mediaChunks = []
let mediaStream = null
let voiceStartX = 0, voiceStartY = 0
let voiceCanceled = false  // true = 拉出框外，松手就清空

function getInput() { return document.getElementById('chatInput') }
function setInputText(t) { const inp = getInput(); if (!inp) return; inp.value = t }
function getInputText() { const inp = getInput(); return inp ? inp.value : '' }

// 把"基础文本 + 临时识别"显示到长条上 + 同步到输入框
function _updateVoiceDisplay(combinedText) {
  const txt = (combinedText || '').trim()
  // 长条上的识别文字
  const pill = document.getElementById('voiceBtn')
  if (pill) {
    const textEl = pill.querySelector('.voice-text')
    if (textEl) textEl.textContent = txt
    pill.classList.toggle('has-text', !!txt)
  }
  // 同步到输入框
  const inp = getInput()
  if (inp && inp.value !== txt) {
    inp.value = txt
    try { inp.setSelectionRange(inp.value.length, inp.value.length) } catch(e) {}
  }
}

function setVoiceBtnState(state) {
  const btn = document.getElementById('voiceBtn')
  if (btn) btn.classList.toggle('listening', state === 'on')
}

// 优先用 webkitSpeechRecognition（实时+免费），失败/不支持时降级到 /stt（本地 whisper）
function startVoice() {
  if (isListening) return
  // ★ 手机浏览器自带的语音识别通常可用（用系统引擎，不依赖Google）
  // 桌面浏览器在国内基本不可用（需要Google服务）
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  if (isMobile && SR) {
    // 手机：先试浏览器自带（实时显示、速度快）
    _startVoiceWebkit()
  } else if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    // 桌面：用本地 whisper 识别（/stt 端点）
    _startVoiceServer()
  } else {
    showToast('当前浏览器不支持语音输入，请用 Edge/Chrome 桌面版或手动输入')
  }
}

function _startVoiceWebkit() {
  try {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    voiceRecog = new SR()
    voiceRecog.lang = 'zh-CN'
    voiceRecog.interimResults = true
    voiceRecog.continuous = false
    voiceBaseText = getInputText()
    voiceInterimShown = ''
    voiceCanceled = false
    isListening = true
    setVoiceBtnState('on')
    voiceRecog.onresult = (e) => {
      let interim = '', finalText = ''
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const tr = e.results[i][0].transcript
        if (e.results[i].isFinal) finalText += tr
        else interim += tr
      }
      if (finalText) voiceBaseText = (voiceBaseText ? voiceBaseText + ' ' : '') + finalText.trim()
      voiceInterimShown = interim
      _updateVoiceDisplay((voiceBaseText + (voiceInterimShown ? ' ' + voiceInterimShown : '')).trim())
    }
    voiceRecog.onerror = (e) => {
      const code = e && e.error || ''
      if (code === 'not-allowed' || code === 'service-not-allowed') {
        showToast('浏览器语音权限不可用，尝试用本地识别…')
        stopVoice({ cancel: true })
        _startVoiceServer()
        return
      }
      let msg = '语音识别出错：' + code
      if (code === 'no-speech') msg = '没听到声音，请再试一次'
      else if (code === 'network') msg = '浏览器语音需联网，已为你切到本地识别…'
      showToast(msg)
      if (code === 'network') { stopVoice({ cancel: true }); _startVoiceServer() } else { stopVoice({ cancel: true }) }
    }
    voiceRecog.onend = () => { if (isListening) stopVoice({ cancel: voiceCanceled }) }
    voiceRecog.start()
  } catch (e) {
    showToast('启动语音识别失败：' + e.message)
    stopVoice({ cancel: true })
  }
}

async function _startVoiceServer() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true })
    mediaChunks = []
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType: _pickMime() })
    mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) mediaChunks.push(e.data) }
    mediaRecorder.onstop = async () => {
      const blob = new Blob(mediaChunks, { type: mediaRecorder.mimeType || 'audio/webm' })
      mediaChunks = []
      if (mediaStream) { try { mediaStream.getTracks().forEach(t => t.stop()) } catch(e){}; mediaStream = null }
      // 用户拖出去取消 → 清空
      if (voiceCanceled) {
        voiceBaseText = ''
        voiceInterimShown = ''
        _updateVoiceDisplay('')
        isListening = false
        setVoiceBtnState('off')
        showToast('已取消发送')
        return
      }
      _updateVoiceDisplay((voiceBaseText ? voiceBaseText + ' ' : '') + '（正在识别…）')
      try {
        const fd = new FormData()
        fd.append('audio', blob, 'voice.' + (blob.type.split('/')[1] || 'webm'))
        const ctrl = new AbortController()
        const timer = setTimeout(() => ctrl.abort(), 30000)  // 30秒超时
        const r = await fetch('/stt', { method: 'POST', body: fd, signal: ctrl.signal })
        clearTimeout(timer)
        const j = await r.json()
        if (j && j.text) {
          voiceBaseText = (voiceBaseText ? voiceBaseText + ' ' : '') + j.text.trim()
          _updateVoiceDisplay(voiceBaseText.trim())
          // 识别完成 → 松开直接发送
          _sendVoiceResult(voiceBaseText.trim())
        } else if (j && j.error) {
          showToast('本地识别失败：' + (j.detail || j.error))
          isListening = false
          setVoiceBtnState('off')
        }
      } catch (err) {
        showToast('上传识别失败：' + err.message)
        isListening = false
        setVoiceBtnState('off')
      }
    }
    mediaRecorder.start()
    voiceBaseText = getInputText()
    voiceInterimShown = ''
    voiceCanceled = false
    isListening = true
    setVoiceBtnState('on')
  } catch (e) {
    showToast('无法访问麦克风：' + e.message)
    isListening = false
    setVoiceBtnState('off')
  }
}

function _pickMime() {
  const mimes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4']
  for (const m of mimes) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m
  }
  return ''
}

// 识别完成后直接发送（松开即发）
function _sendVoiceResult(text) {
  isListening = false
  setVoiceBtnState('off')
  if (!text) {
    showToast('没听清，请再说一次')
    voiceBaseText = ''
    voiceInterimShown = ''
    _updateVoiceDisplay('')
    return
  }
  // 写入输入框 → 调用统一发送
  setInputText(text)
  handleSend()
  // 兜底清理
  voiceBaseText = ''
  voiceInterimShown = ''
  _updateVoiceDisplay('')
}

// 停止录音（opts.cancel = true 表示拉出框外撤回）
function stopVoice(opts) {
  opts = opts || {}
  const cancel = !!opts.cancel
  if (voiceRecog) {
    try { voiceRecog.stop() } catch(e) {}
    voiceRecog = null
  }
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    voiceCanceled = cancel
    try { mediaRecorder.stop() } catch(e) {}
    return  // onstop 处理后续
  }
  // webkit 路径：直接走流程
  isListening = false
  setVoiceBtnState('off')
  if (cancel) {
    voiceBaseText = ''
    voiceInterimShown = ''
    _updateVoiceDisplay('')
    showToast('已取消发送')
    return
  }
  if (voiceInterimShown) {
    voiceBaseText = (voiceBaseText ? voiceBaseText + ' ' : '') + voiceInterimShown.trim()
    voiceInterimShown = ''
  }
  const finalText = voiceBaseText.trim()
  voiceBaseText = ''
  _sendVoiceResult(finalText)
}

// 按住长条：200ms 后开始说话；松开发送；拖出按钮 60px 视为撤回
function bindVoiceButton(btn) {
  if (!btn) return
  let pressTimer = null
  let activePointerId = null
  const CANCEL_DISTANCE = 60

  function _onDown(e) {
    if (activePointerId !== null) return
    activePointerId = e.pointerId
    voiceStartX = e.clientX
    voiceStartY = e.clientY
    voiceCanceled = false
    btn.setPointerCapture && btn.setPointerCapture(e.pointerId)
    pressTimer = setTimeout(() => {
      startVoice()
    }, 200)
  }

  function _onMove(e) {
    if (activePointerId !== e.pointerId || !isListening) return
    const dx = e.clientX - voiceStartX
    const dy = e.clientY - voiceStartY
    const dist = Math.sqrt(dx*dx + dy*dy)
    const shouldCancel = dist > CANCEL_DISTANCE
    if (shouldCancel !== voiceCanceled) {
      voiceCanceled = shouldCancel
      btn.classList.toggle('will-cancel', shouldCancel)
    }
  }

  function _onUp(e) {
    if (activePointerId !== e.pointerId) return
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null }
    btn.classList.remove('will-cancel', 'will-send', 'snap-back')
    btn.releasePointerCapture && btn.releasePointerCapture(e.pointerId)
    activePointerId = null
    if (isListening) {
      btn.classList.add('snap-back')
      setTimeout(() => btn.classList.remove('snap-back'), 100)
      stopVoice({ cancel: voiceCanceled })
    }
  }

  function _onCancel(e) {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null }
    btn.classList.remove('will-cancel', 'will-send', 'snap-back')
    activePointerId = null
    if (isListening) stopVoice({ cancel: true })
  }

  btn.addEventListener('pointerdown', _onDown)
  btn.addEventListener('pointermove', _onMove)
  btn.addEventListener('pointerup', _onUp)
  btn.addEventListener('pointercancel', _onCancel)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isListening) stopVoice({ cancel: true })
  })
}

function bindAllVoiceButtons() {
  bindVoiceButton(document.getElementById('voiceBtn'))      // 长条
}

function toggleVoice() {
  if (isListening) stopVoice({ cancel: true })
  else startVoice()
}

// ========= 输入模式切换（语音条 ↔ 输入框·通过 ⌨️ 按钮显式切换） =========
let inputMode = 'voice'
function setInputMode(mode) {
  inputMode = mode
  const bar = document.getElementById('inputBar')
  const kbd = document.getElementById('keyboardBtn')
  if (!bar) return
  bar.classList.toggle('voice-mode', mode === 'voice')
  bar.classList.toggle('text-mode', mode === 'text')
  // 切换按钮图标：语音模式显示⌨️（点击切到打字），文字模式显示🎙（点击切到语音）
  if (kbd) {
    if (mode === 'voice') {
      kbd.textContent = '⌨️'
      kbd.title = '切换到键盘输入'
    } else {
      kbd.textContent = '🎙'
      kbd.title = '切换到语音输入'
    }
  }
  if (mode === 'text') {
    setTimeout(() => { const i = getInput(); if (i) i.focus() }, 50)
  } else {
    _updateVoiceDisplay(getInputText())
  }
}

function bindInputModeSwitch() {
  const kbd = document.getElementById('keyboardBtn')
  if (kbd) {
    kbd.addEventListener('click', () => {
      setInputMode(inputMode === 'voice' ? 'text' : 'voice')
    })
  }
  // 全局快捷键：Ctrl+K 或 Alt+K 切换 voice ⇄ text
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault()
      setInputMode(inputMode === 'voice' ? 'text' : 'voice')
    }
  })
  // 输入框 typing → 同步到长条
  const inp = getInput()
  if (inp) {
    inp.addEventListener('input', () => {
      voiceBaseText = inp.value
      _updateVoiceDisplay(inp.value)
    })
  }
  // Esc 回到语音模式
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && inputMode === 'text' && document.activeElement === inp) {
      setInputMode('voice')
    }
  })
}

// ========= 上传媒体（隐式：拖入 / 粘贴 / 文件选择器，UI 上不暴露 ➕ 按钮） =========
function bindMediaUpload() {
  const file = document.getElementById('mediaFileInput')
  if (!file) return
  file.addEventListener('change', async (e) => {
    const f = e.target.files && e.target.files[0]
    if (!f) return
    if (f.type.startsWith('video/')) {
      showToast('已选择视频：' + f.name)
      addMessage('[视频] ' + f.name, true)
      const dataUrl = await fileToDataURL(f)
      const fileId = await uploadFileToCoze(dataUrl, f.name, f.type)
      if (fileId) sendToCozeWithFile('请看看这段视频里有什么', fileId)
    } else {
      const dataUrl = await fileToDataURL(f)
      addPhotoMessage(dataUrl)
      const fileId = await uploadFileToCoze(dataUrl, f.name, f.type || 'image/jpeg')
      if (fileId) sendToCozeWithImage('请看看这张图片', fileId)
    }
    file.value = ''
  })
  // 全局粘贴：截图后 Ctrl+V 直接上传
  document.addEventListener('paste', async (e) => {
    const items = e.clipboardData && e.clipboardData.items
    if (!items) return
    for (const it of items) {
      if (it.type && it.type.startsWith('image/')) {
        const blob = it.getAsFile()
        if (!blob) continue
        e.preventDefault()
        const dataUrl = await fileToDataURL(blob)
        addPhotoMessage(dataUrl)
        const fileId = await uploadFileToCoze(dataUrl, 'paste.png', blob.type || 'image/png')
        if (fileId) sendToCozeWithImage('请看看这张图片', fileId)
        return
      }
    }
  })
  // 拖拽：把图片拖到窗口任意位置
  document.addEventListener('dragover', (e) => { e.preventDefault() })
  document.addEventListener('drop', async (e) => {
    e.preventDefault()
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]
    if (!f) return
    if (f.type.startsWith('image/')) {
      const dataUrl = await fileToDataURL(f)
      addPhotoMessage(dataUrl)
      const fileId = await uploadFileToCoze(dataUrl, f.name, f.type || 'image/jpeg')
      if (fileId) sendToCozeWithImage('请看看这张图片', fileId)
    } else if (f.type.startsWith('video/')) {
      const dataUrl = await fileToDataURL(f)
      const fileId = await uploadFileToCoze(dataUrl, f.name, f.type)
      if (fileId) sendToCozeWithFile('请看看这段视频里有什么', fileId)
    } else {
      showToast('仅支持图片/视频')
    }
  })
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader()
    r.onload = () => resolve(r.result)
    r.onerror = reject
    r.readAsDataURL(file)
  })
}

async function uploadFileToCoze(dataUrl, filename, contentType) {
  try {
    showToast('正在上传文件…')
    // dataURL → Blob
    const blob = await (await fetch(dataUrl)).blob()
    const form = new FormData()
    form.append('file', blob, filename)
    const r = await fetch('/coze-api/v1/files/upload', { method: 'POST', body: form })
    const j = await r.json()
    if (j && j.data && j.data.id) {
      showToast('上传成功')
      return j.data.id
    }
    console.error('[Upload] fail', j)
    showToast('上传失败：' + (j.msg || JSON.stringify(j).slice(0, 80)))
    return null
  } catch (e) {
    console.error('[Upload]', e)
    showToast('上传异常：' + e.message)
    return null
  }
}

// ========= 语音播报（AI 回复 → Edge TTS 念出来） =========
let ttsEnabled = true  // 默认开启
let _audioUnlocked = false  // 手机音频解锁标记

// ★ 手机音频解锁：首次用户交互时播放一段静音，解锁 audio.play()
function _unlockAudio() {
  if (_audioUnlocked) return
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)()
    const src = ctx.createBufferSource()
    src.connect(ctx.destination)
    src.start(0)
    _audioUnlocked = true
    console.log('[Audio] 已解锁音频播放')
  } catch(e) {}
}
// 页面加载后监听首次交互
document.addEventListener('pointerdown', _unlockAudio, { once: true })
document.addEventListener('keydown', _unlockAudio, { once: true })
let currentAudio = null  // 当前播放的 audio 元素

// 清洗 Markdown / 代码符号，让 TTS 念得更自然
function cleanTextForTTS(text) {
  if (!text) return ''
  let t = text
  // 1) 去掉代码块 ```...```（晓晓会念"三个反引号"超难听）
  t = t.replace(/```[\s\S]*?```/g, ' 代码块已省略 ')
  // 2) 行内代码 `xxx` → xxx
  t = t.replace(/`([^`]+)`/g, '$1')
  // 3) 图片 ![alt](url) → "图片"
  t = t.replace(/!\[[^\]]*\]\([^)]*\)/g, '图片')
  // 4) 链接 [文字](url) → 文字
  t = t.replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
  // 5) 标题 # ## ### → 去掉井号
  t = t.replace(/^#{1,6}\s*/gm, '')
  // 6) 强调 **xx** __xx__ → xx   *xx* _xx_ → xx
  t = t.replace(/(\*\*|__)(.*?)\1/g, '$2')
  t = t.replace(/(\*|_)(.*?)\1/g, '$2')
  // 7) 列表项 - * + 开头的 → 去掉符号
  t = t.replace(/^\s*[-*+]\s+/gm, '')
  // 8) 有序列表 1. → 去掉
  t = t.replace(/^\s*\d+\.\s+/gm, '')
  // 9) 引用 > 开头 → 去掉
  t = t.replace(/^\s*>\s*/gm, '')
  // 10) 水平线 --- *** → 改成短停顿
  t = t.replace(/^[\s]*(?:---|\*\*\*|___)[\s]*$/gm, '。')
  // 11) 表格 | 符号 → 替换成逗号
  t = t.replace(/\|/g, '，')
  // 12) 多个连续空白 / 换行 → 单个空格
  t = t.replace(/\s+/g, ' ').trim()
  return t
}

async function speakText(text) {
  if (!ttsEnabled || !text) return
  // 去掉思考过程标签和 Markdown 符号
  const cleanText = cleanTextForTTS(text.replace(/<[^>]*>/g, ''))
  if (!cleanText) return
  // 停掉之前正在播的
  if (currentAudio) {
    try { currentAudio.pause() } catch(e) {}
    currentAudio = null
  }
  // 如果 speechSynthesis 正在播，停掉
  if (window.speechSynthesis) {
    try { window.speechSynthesis.cancel() } catch(e) {}
  }
  // 先尝试用服务器 Edge TTS
  try {
    const resp = await fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: cleanText, voice: 'zh-CN-XiaoxiaoNeural' })
    })
    if (resp.ok) {
      const blob = await resp.blob()
      const url = URL.createObjectURL(blob)
      const audio = new Audio(url)
      currentAudio = audio
      audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null }
      audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null }
      await audio.play().catch(e => {
        console.warn('[TTS] 服务器音频播放失败，尝试浏览器内置语音…', e.message)
        URL.revokeObjectURL(url)
        _speakBrowserTTS(cleanText)
      })
    } else {
      console.warn('[TTS] 服务器返回错误:', resp.status, '，尝试浏览器内置语音…')
      _speakBrowserTTS(cleanText)
    }
  } catch (e) {
    console.warn('[TTS] 服务器TTS失败，尝试浏览器内置语音…', e.message)
    _speakBrowserTTS(cleanText)
  }
}

// ★ 浏览器内置语音合成（手机/桌面都支持，不需要服务器）
function _speakBrowserTTS(text) {
  if (!window.speechSynthesis) {
    console.warn('[TTS] 浏览器不支持语音合成')
    return
  }
  try {
    window.speechSynthesis.cancel()
    const u = new SpeechSynthesisUtterance(text)
    u.lang = 'zh-CN'
    u.rate = 1.0
    u.pitch = 1.0
    // 尝试找中文语音
    const voices = window.speechSynthesis.getVoices()
    const zhVoice = voices.find(v => v.lang.startsWith('zh'))
    if (zhVoice) u.voice = zhVoice
    window.speechSynthesis.speak(u)
    console.log('[TTS] 使用浏览器内置语音播放')
  } catch(e) {
    console.warn('[TTS] 浏览器语音也不可用:', e.message)
  }
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled
  const btn = document.getElementById('ttsBtn')
  btn.classList.toggle('active', ttsEnabled)
  btn.textContent = ttsEnabled ? '🔊' : '🔈'
  if (!ttsEnabled && currentAudio) {
    try { currentAudio.pause() } catch(e) {}
    currentAudio = null
  }
  showToast(ttsEnabled ? '🔊 语音播报已开启' : '🔈 语音播报已关闭')
}

function stopSpeaking() {
  if (currentAudio) {
    try { currentAudio.pause() } catch(e) {}
    currentAudio = null
  }
  // 也停掉浏览器原生 TTS（如果有）
  if (window.speechSynthesis) window.speechSynthesis.cancel()
}

// ========= Coze API（纯文字对话） =========
async function sendToCoze(userText) {
  if (isSending) return
  // 不再预检：直接发请求，让 handleApiError 处理失败
  isSending = true
  document.getElementById('sendBtn').disabled = true

  addTyping()

  // 追加位置信息（如果有）
  const finalText = userText + getLocationContext()

  const reqBody = {
    bot_id: COZE_BOT_ID,
    user_id: USER_ID,
    stream: true,
    auto_save_history: true,
    additional_messages: [{
      role: 'user',
      content_type: 'text',
      content: finalText
    }]
  }
  if (conversationId) {
    reqBody.conversation_id = conversationId
  }

  try {
    await doCozeStreamRequest(reqBody)
  } catch (err) {
    removeTyping()
    handleApiError(err)
  } finally {
    isSending = false
    document.getElementById('sendBtn').disabled = false
  }
}

  const messageContent = JSON.stringify([

      role: 'user',

    }]

    handleApiError(err)
  } finally {
    isSending = false
    document.getElementById('sendBtn').disabled = false
  }
}

// ========= 通用流式请求处理 =========
async function doCozeStreamRequest(reqBody, _retry = true) {
  let resp
  try {
    resp = await fetch(COZE_API + '/v3/chat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + COZE_PAT,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(reqBody)
    })
  } catch (e) {
    // 网络层错误（连不上服务器）→ 直接抛给 handleApiError
    throw e
  }

  if (!resp.ok) {
    const errTxt = await resp.text().catch(() => '')
    // ★ 只在 404 且错误信息明确提到 conversation_id 时，才认为是对话ID过期
    const isConvExpired = conversationId
      && resp.status === 404
      && /conversation/i.test(errTxt)
    if (isConvExpired && _retry) {
      console.warn('[Coze] 对话 ID 已过期，正在重新建立连接...')
      conversationId = null
      delete reqBody.conversation_id
      showToast('连接已断开，正在重新连接...')
      return await doCozeStreamRequest(reqBody, false)
    }
    // ★ 显示具体错误原因（截断长文本）
    console.error('[Coze] HTTP ' + resp.status + ':', errTxt.slice(0, 500))
    throw new Error('HTTP_' + resp.status + ':' + errTxt.slice(0, 200))
  }

  removeTyping()

  // 创建流式消息
  const msgEl = document.createElement('div')
  msgEl.className = 'msg-ai'
  msgEl.innerHTML = '<span id="streamText"></span><span class="stream-cursor"></span>'
  document.getElementById('chatArea').appendChild(msgEl)
  scrollToBottom()

  const streamTextEl = msgEl.querySelector('#streamText')
  let fullText = ''

  const reader = resp.body.getReader()
  const decoder = new TextDecoder()
  let buffer = ''

  while (true) {
    const chunk = await reader.read()
    if (chunk.done) break

    buffer += decoder.decode(chunk.value, { stream: true })
    buffer = buffer.replace(/\r\n/g, '\n')

    const parts = buffer.split('\n\n')
    buffer = parts.pop()

    for (let i = 0; i < parts.length; i++) {
      const evtText = parts[i]
      if (!evtText.trim()) continue

      const lines = evtText.split('\n')
      let eventType = ''
      let eventData = ''

      for (let j = 0; j < lines.length; j++) {
        const line = lines[j]
        if (line.charAt(0) === ':') continue
        if (line.startsWith('event:')) { eventType = line.slice(6).trim() }
        else if (line.startsWith('data:')) {
          let d = line.slice(5)
          if (d.charAt(0) === ' ') d = d.slice(1)
          if (eventData) eventData += '\n'
          eventData += d
        }
      }

      if (!eventData) continue

      let data
      try { data = JSON.parse(eventData) } catch (e) { continue }

      if (data.conversation_id && !conversationId) {
        conversationId = data.conversation_id
      }

      // ★ SSE 解析关键修正：
      //    1) delta 事件用 data.content（官方文档字段名），不是 delta_content
      //    2) 豆包 1.8 深度思考模型：同一 message id 早期只有 reasoning_content（思考过程），
      //       content 一直是空字符串；后期切到正式回复才有 content
      //    3) 策略：优先取 content；如果 content 为空但 reasoning 有内容也用 reasoning
      //       （避免屏幕上一直空着）
      if (eventType === 'conversation.message.delta') {
        if (data.type === 'answer') {
          // 优先用 content（普通模型），否则用 reasoning_content（深度思考过程）
          const delta = data.content || data.reasoning_content || ''
          if (delta) {
            fullText += delta
            streamTextEl.textContent = fullText
            scrollToBottom()
          }
        }
      }

      if (eventType === 'conversation.message.completed') {
        if (data.type === 'answer' && (data.content || data.reasoning_content)) {
          // 优先用 content（最终正式回复），其次 reasoning_content
          fullText = data.content || data.reasoning_content
          streamTextEl.textContent = fullText
          scrollToBottom()
        }
      }

      // 对话完成事件
      if (eventType === 'conversation.chat.completed') {
        // 完成后清洗为纯文本（屏幕显示和 TTS 念的一致）
        const displayText = cleanTextForTTS(fullText)
        msgEl.innerHTML = ''
        msgEl.textContent = displayText || '抱歉，AI 暂时无法回复，请重试。'

        if (!displayText) {
          addMessage('抱歉，AI 暂时无法回复，请重试。', false)
        } else {
          speakText(displayText)  // 🔊 屏幕显示什么，晓晓就念什么
        }

        // 🔗 自动截帧触发器：AI 回复完成后，如果开启自动截帧且有摄像头，自动截帧并发给 AI
        if (autoCaptureOn && cameraStream) {
          setTimeout(autoCaptureTrigger, 1500)
        }
      }

      if (eventType === 'conversation.chat.failed') {
        // 提取 Coze 返回的具体失败原因（如配额耗尽、参数错误等）
        let reason = ''
        try {
          const errObj = data && data.last_error
          if (errObj && errObj.msg) reason = errObj.msg
          else if (data && data.msg) reason = data.msg
        } catch (e) {}
        throw new Error('CHAT_FAILED:' + (reason || '未知错误'))
      }
    }
  }

  // 如果没有收到 chat.completed 事件，手动完成
  if (msgEl.querySelector('.stream-cursor')) {
    msgEl.innerHTML = ''
    msgEl.textContent = cleanTextForTTS(fullText) || '抱歉，AI 暂时无法回复，请重试。'
    if (!fullText) {
      addMessage('抱歉，AI 暂时无法回复，请重试。', false)
    }
  }
}

// ========= 错误处理 =========
function handleApiError(err) {
  console.error('[Coze API] Error:', err)
  let errMsg = '⚠️ 连接失败，请检查网络。'
  const msg = err.message || ''
  // 当前访问的 URL（让用户看到自己用的是什么地址）
  const curURL = window.location.origin
  if (msg.indexOf('Failed to fetch') !== -1 || msg.indexOf('NetworkError') !== -1 || msg.indexOf('fetch') !== -1) {
    // 真正连不上时才显示红框
    const bar = document.getElementById('connBar')
    if (bar) {
      bar.innerHTML = '⚠️ AI 服务未连接 — 当前访问地址: <b>' + curURL + '</b> 无法连接到代理服务器。请确认：<br>1) 电脑已运行 <b>python server.py</b> 或 <b>start-server.bat</b>　2) 手机访问请用电脑的局域网 IP（不是 localhost）'
      bar.style.display = 'flex'
    }
    errMsg = '⚠️ 无法连接 AI 服务（' + curURL + '）。\n请确认代理服务器已启动，且用正确的 IP 访问。'
  } else if (msg.indexOf('HTTP_401') !== -1) {
    errMsg = '⚠️ 认证失败，请检查 API 令牌。'
  } else if (msg.indexOf('HTTP_404') !== -1) {
    errMsg = '⚠️ 智能体未找到，请检查 bot_id。'
  } else if (msg.indexOf('UPLOAD') !== -1) {
    errMsg = '⚠️ 图片上传失败，请重试。'
  } else if (msg.indexOf('CHAT_FAILED') !== -1) {
    // 显示 Coze 返回的真实原因（便于排查：配额、参数、bot配置等）
    const reason = msg.replace('CHAT_FAILED:', '').replace('CHAT_FAILED', '').trim()
    errMsg = '⚠️ 对话处理失败：' + (reason || '请重试') + '\n\n如果是"配额/credits"相关，请到 coze.cn 个人中心查看。'
  }
  addMessage(errMsg, false)
}

// ========= 初始化 =========
window.addEventListener('load', () => {
  // 先检查服务器是否在线（探活失败不打扰用户，只在 API 实际失败时才报错）
  checkServer().then(ok => {
    // 不管 ok 与否都先显示欢迎语，让用户立刻看到界面
    addMessage('你好！我是 AI 导览助手 🤖\n\n我可以帮你：\n📸 拍照识别商品/景点/菜单\n📖 读取和翻译菜单\n📚 历史解惑\n🗺 规划游览路线\n\n点击 📸 拍照识别，或直接输入问题！\n开启 🔗 自动截帧，AI 回复后自动识别镜头画面。', false)
    if (!ok) {
      // 探活失败，再追加一条软提示
      setTimeout(() => {
        addMessage('⚠️ 提示：AI 服务探活失败。\n如果你看到这行后仍能正常对话，请忽略。\n否则请检查代理服务器（start-server.bat）是否启动。', false)
      }, 600)
    }
  })

  // 自动开启摄像头
  startCamera()

  // 静默尝试获取用户位置（GPS → IP），失败也不打扰用户
  // 成功的话后续对话会自动带上经纬度，Coze 导览/路线规划才能工作
  tryAutoLocate().then(loc => {
    if (loc) {
      console.log('[Init] 位置已就绪:', loc)
    } else {
      console.log('[Init] 自动定位失败，用户可手动设置（导航页用）')
    }
  })
})
</script>
</body>
</html>
